<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registro</title>
     <link rel="stylesheet" href="../../global.css">
     <link rel="stylesheet" href="register.css">
     <link rel="stylesheet" href="../../index.css">

    <script src="../../validations.js"></script>
    <script type="module" src="register.js"></script>
     <script type="module" src="../../index.js"></script> 
    <script src="../../loading.js"></script>
</head>
<body class="centralize">
    <form>
        <div class="form-field">
            <div><label for="email">e-mail</label></div>
            <input type="email" placeholder="seu@email.com" id="email">
            <div class="error" id="email-invalid-error">Email é inválido</div>
            <div class="error" id="email-required-error">Email é obrigatório</div>
        </div>
        <div class="form-field">
            <div><label for="password">senha</label></div>
            <input type="password" placeholder="senha" id="password">
            <div class="error" id="password-required-error">Senha é obrigatória</div>
            <div class="error" id="password-min-length-error">Senha tem que ter 6 caracteres</div>
        </div>
        <div class="form-field">
            <div><label for="confirmPassword">confirme sua senha:</label></div>
            <input type="password" placeholder="confirme a senha" id="confirmPassword">
             <div class="error" id="password-doesnt-match-error">Deve ser igual ao de cima</div>
        </div>
        <div>
            <button type="button" class="solid" disabled="true" id="register-button" onclick="register()">registrar</button>
        </div>

        <div>
            <button type="button" class="clear" onclick="login2()">login</button>
        </div>
    </form>
</body>


</html>
